services:
  bot:
    image: ghcr.io/mykytakuzminov/dld-quiz-bot:latest
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dld_quiz_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
